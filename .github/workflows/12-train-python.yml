name: Traffic Model Training (Python)

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

concurrency:
  group: dsai-main-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  train_python:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT REPOSITORY
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: SETUP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: CACHE PIP PACKAGES
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-train-${{ hashFiles('.github/workflows/12-train-python.yml', '12_end/02_train_model.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-train-
            ${{ runner.os }}-pip-

      - name: INSTALL PYTHON DEPENDENCIES
        run: pip install requests pandas xgboost scikit-learn

      - name: RUN TRAINING JOB
        working-directory: 12_end
        run: python 02_train_model.py

      - name: COMMIT CHANGES
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 12_end/data/modelpy.json 12_end/data/validationpy.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: retrain traffic model $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
